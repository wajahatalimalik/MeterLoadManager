name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        continue-on-error: true

      - name: Print Kotlin errors
        run: |
          find . -name "*.log" -path "*/build/*" -exec grep -l "error:" {} \; | head -5 | xargs grep "error:" 2>/dev/null | head -50
          find . -name "output-metadata.json" 2>/dev/null
          ls app/build/outputs/ 2>/dev/null || echo "no outputs folder"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeterLoadManager-debug
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 30